name: build

on:
  schedule:
    # Monday 06:00 UTC — catches the typical Alpine point-release cadence
    # (Fridays/Sundays, depending on the branch) without hammering runners.
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      alpine_version:
        description: 'Alpine branch (e.g. 3.23, 3.24, edge)'
        required: false
        default: '3.23'
  push:
    paths:
      - 'config/**'
      - 'tools/**'
      - 'Dockerfile'
      - 'Makefile'
      - '.github/workflows/build.yml'

permissions:
  contents: write   # needed to create/update releases via softprops/action-gh-release

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        alpine: ['3.23']  # add '3.24' / 'edge' here to fan out

    env:
      ALPINE_VER: ${{ matrix.alpine }}
      DEBIAN_FRONTEND: noninteractive

    steps:
      - uses: actions/checkout@v4

      - name: Install host build deps
        # We could docker-build-and-run, but direct host-side is faster in
        # CI (no image pull, no container spin-up). Mirror the Dockerfile
        # apt list.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-riscv64-linux-gnu libc6-dev-riscv64-cross \
            bc bison flex libssl-dev libelf-dev libncurses-dev \
            build-essential cpio kmod ccache \
            squashfs-tools e2fsprogs util-linux \
            ca-certificates curl wget git \
            xz-utils zstd python3 jq

      - name: Register binfmt_misc for riscv64 (qemu-user-static)
        # apk's post-install triggers (busybox sets up /bin/* symlinks,
        # ca-certificates rebuilds the bundled cert) are riscv64 ELF
        # binaries. apk execs them directly during `apk add`, so without
        # qemu emulation registered with binfmt_misc the build host's
        # kernel returns ENOEXEC and apk exits with "execve: Exec format
        # error" / "exited with error 127". docker/setup-qemu-action
        # handles installation + binfmt registration in one step (uses
        # tonistiigi/binfmt under the hood).
        uses: docker/setup-qemu-action@v3
        with:
          platforms: riscv64

      - name: Wire up ccache
        # Cuts config-only rebuilds from ~30 min to ~5 min. On a kernel
        # version bump (rare) the cache goes cold and we're back to full
        # build time. ccache speaks the cross-compiler name directly; no
        # masquerade PATH trick needed since we invoke it via
        # CROSS_COMPILE="ccache riscv64-linux-gnu-".
        run: |
          ccache --max-size=1G
          echo "CROSS_COMPILE=ccache riscv64-linux-gnu-" >> $GITHUB_ENV

      # All three caches use the split restore/save pattern (instead of
      # the all-in-one actions/cache@v4) so we can save-on-failure. The
      # all-in-one's post-action defaults to `if: success()`, meaning a
      # downstream step failure (e.g. sysinstall erroring out) silently
      # skips the cache save and the next run pays full cold-cache cost
      # for a 30-min kernel build. The deprecated `save-always: true`
      # input was the old workaround; actions/cache deprecated it
      # (https://github.com/actions/cache/tree/main/save#always-save-cache)
      # in favor of an explicit `actions/cache/save@v4` step gated on
      # `if: always() && steps.<restore>.outputs.cache-hit != 'true'`.
      #
      # Save steps live at the bottom of the build job. Each references
      # the matching restore step's `cache-primary-key` output so the
      # save key matches what the restore expected — no drift if
      # hashFiles() inputs change mid-run.
      #
      # Safety: each cached path is invariant or input-keyed, not
      # failure-tainted output. ccache hashes inputs (won't reuse
      # stale entries), the kernel tarball + extracted source are
      # immutable per version, apk-cache is just .apk downloads.
      - name: Restore kernel source + downloads cache
        id: kernel-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            build/linux-*.tar.xz
            build/linux-*/
            build/alpine-uboot-*.tar.gz
          key: kernel-${{ matrix.alpine }}-${{ hashFiles('config/scev.config', 'tools/build-kernel.sh') }}
          restore-keys: |
            kernel-${{ matrix.alpine }}-

      - name: Restore ccache
        id: ccache-restore
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/ccache
          key: ccache-${{ matrix.alpine }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ matrix.alpine }}-

      - name: Restore apk package downloads cache
        # Used by tools/build-nvme-sysinstall.sh's `apk.static --cache-dir`
        # so the ~50 packages bootstrapped into the sys-install rootfs
        # (alpine-base, openrc, dhcpcd, openssh, …) aren't re-downloaded
        # on every run. Cold cache: ~30–50 MB pulled from dl-cdn. Warm:
        # local copies, ~seconds.
        #
        # Keyed on the script + Alpine branch — the package list is
        # declared inline in the script, so any addition/removal
        # invalidates correctly. The restore-key fallback still picks
        # up the most recent cache for the same Alpine branch when the
        # key misses, so script-only edits get a partial warm cache.
        id: apk-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: build/apk-cache
          key: apk-cache-${{ matrix.alpine }}-${{ hashFiles('tools/build-nvme-sysinstall.sh') }}
          restore-keys: |
            apk-cache-${{ matrix.alpine }}-

      - name: Build kernel
        run: bash tools/build-kernel.sh

      - name: ccache stats
        if: always()
        run: ccache --show-stats

      - name: Build modloop
        run: bash tools/build-modloop.sh

      - name: Build NVMe image (live mode)
        run: bash tools/build-nvme-image.sh

      - name: Build NVMe image (sys-install)
        # Run under sudo: apk.static --initdb refuses to create a package
        # database as a non-root user ("Use --usermode to allow creating
        # database as non-root"). --usermode would let it proceed, but
        # ownership metadata is lost — every file in the bootstrapped
        # staging tree ends up runner-owned, mkfs.ext4 -d propagates that
        # into the image, and the resulting Alpine guest has /etc, /bin,
        # /sbin owned by some random UID. sshd refuses to start
        # (StrictModes), sudo isn't setuid-root, the whole image is broken.
        #
        # Real root via sudo lets apk set proper 0:0 ownership on system
        # paths. -E preserves ALPINE_VER and friends from the workflow
        # env. The chown afterward returns build/ + out/ to runner
        # ownership so the apk-cache save step (and upload-artifact) can
        # read them.
        #
        # Reuses the kernel + modules tree from the steps above — see
        # tools/build-nvme-sysinstall.sh, which bails early if
        # out/vmlinuz-lts isn't present. Marginal cost is the apk.static
        # bootstrap + ext4 pack + zstd, ~5–10 min on a warm runner.
        # The artefact (alpine-scev-sysinstall-*.img[.zst]) rides along
        # via the existing out/alpine-scev-*.img[.zst] globs in the
        # upload + release steps below; downstream mods consume the
        # .zst from the rolling `latest` release.
        run: |
          sudo -E bash tools/build-nvme-sysinstall.sh
          sudo chown -R "$USER:$USER" build/ out/

      - name: Derive release tag
        id: tag
        run: |
          KVER=$(sed -n 's/^KVER=//p' build/kver)
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="alpine-${ALPINE_VER}-linux-${KVER}-${SHORT_SHA}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "kver=${KVER}" >> "$GITHUB_OUTPUT"

      - name: Upload build artefacts
        # `if: always()` so a failure in a late step (e.g. image packing)
        # still surfaces whatever the earlier steps produced. Otherwise we
        # throw away a 30-minute kernel compile every time the Alpine-side
        # URL resolution glitches.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scev-alpine-${{ matrix.alpine }}
          path: |
            out/vmlinuz-lts
            out/modloop-lts
            out/alpine-scev-*.img
            out/alpine-scev-*.img.zst
            out/config-*.riscv64
            out/SHA256SUMS
          if-no-files-found: warn
          retention-days: 30

      - name: Publish rolling 'latest' release
        # On every push to main, overwrite the `latest` tag with the new
        # artefacts. Gives the mod's Gradle fetch step a stable URL
        # (https://github.com/<owner>/scev-alpine/releases/download/latest/…)
        # without having to bump a version pin every build.
        if: github.ref == 'refs/heads/main' && matrix.alpine == '3.23'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest main build"
          prerelease: true
          make_latest: false       # keep dated tags as the canonical releases
          files: |
            out/vmlinuz-lts
            out/modloop-lts
            out/alpine-scev-*.img
            out/alpine-scev-*.img.zst
            out/config-*.riscv64
            out/SHA256SUMS
          body: |
            Rolling latest build of `main`. Overwritten every push.

            - Commit: ${{ github.sha }}
            - Kernel: ${{ steps.tag.outputs.kver }}
            - Alpine: ${{ matrix.alpine }}

            Consumers: the scev mod fetches
            `alpine-scev-*.img` from this release at build time. For a
            stable pin, use one of the dated `alpine-*-linux-*-<sha>`
            releases instead.

      - name: Publish dated release
        # Only on scheduled runs + explicit dispatches. Push-triggered CI
        # only bumps the rolling `latest` tag above — keeps the versioned
        # release list tied to deliberate cadence, not every commit.
        if: github.event_name != 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Alpine ${{ matrix.alpine }} • Linux ${{ steps.tag.outputs.kver }}-scev
          generate_release_notes: true
          files: |
            out/vmlinuz-lts
            out/modloop-lts
            out/alpine-scev-*.img
            out/alpine-scev-*.img.zst
            out/config-*.riscv64
            out/SHA256SUMS

      # Cache saves run last, gated on `if: always()` so they fire even
      # if any earlier step (kernel build, sysinstall, release publish)
      # failed. The `cache-hit != 'true'` guard skips the save when the
      # restore got an exact-key match — the cache for that key already
      # exists, no point uploading a duplicate. Restore-key (partial)
      # hits return `cache-hit = 'false'`, so they DO trigger a save
      # under the new exact key.
      - name: Save kernel source + downloads cache
        if: always() && steps.kernel-cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            build/linux-*.tar.xz
            build/linux-*/
            build/alpine-uboot-*.tar.gz
          key: ${{ steps.kernel-cache-restore.outputs.cache-primary-key }}

      - name: Save ccache
        if: always() && steps.ccache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/ccache
          key: ${{ steps.ccache-restore.outputs.cache-primary-key }}

      - name: Save apk package downloads cache
        if: always() && steps.apk-cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: build/apk-cache
          key: ${{ steps.apk-cache-restore.outputs.cache-primary-key }}
